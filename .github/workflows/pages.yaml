name: Build and deploy Pages

on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: Log level
        required: true
        default: Information
        type: choice
        options:
          - Verbose
          - Debug
          - Information
          - Warning

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download BGG ranks CSV
        run: |
          mkdir -p _input
          curl -L \
            -o _input/boardgames_ranks.csv \
            "https://github.com/${{ github.repository }}/releases/download/data-input/boardgames_ranks.csv"

      - name: Prepare Pages site
        run: |
          mkdir -p _site
          cp -a Frontend/. _site/

      - name: Generate data.json
        run: >
          dotnet run --configuration Release --project DigitalBoardGameList.csproj --
          LogLevel=${{ inputs.logLevel }}
          InputPath=games.yaml
          OutputPath=_site/data.json
          BggCsvPath=_input/boardgames_ranks.csv
          OnlyNew=false
          ForceDlcUpdate=false
          TestRun=false

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4