name: Build and deploy Pages

on:
  workflow_dispatch:
    inputs:
      
      logLevel:
        description: Log level
        required: true
        default: Verbose
        type: choice
        options:
          - Verbose
          - Debug
          - Information
          - Warning
          - 
      previousCatalogUrl:
        description: Previous catalog url
        required: false
        default: https://exvault.github.io/DigitalBoardGameList/data.json
        type: string
        
      onlyNew:
        description: Only new
        required: true
        default: false
        type: boolean
        
      forceDlcUpdate:
        description: Force DLC update
        required: true
        default: false
        type: boolean
        
      testRun:
        description: Test run
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download BGG ranks CSV
        run: |
          mkdir -p _input
          curl -fL \
            -o _input/boardgames_ranks.csv \
            "https://github.com/${{ github.repository }}/releases/download/data-input/boardgames_ranks.csv"
          test -s _input/boardgames_ranks.csv

      - name: Download previous catalog
        env:
          PREVIOUS_CATALOG_URL: ${{ inputs.previousCatalogUrl }}
        run: |
          mkdir -p _input

          if [ -z "$PREVIOUS_CATALOG_URL" ]; then
            echo "Previous catalog URL is empty. Treating this as first run."
            exit 0
          fi

          http_status=$(curl -L -sS -w "%{http_code}" \
            -o _input/previous-catalog.json \
            "$PREVIOUS_CATALOG_URL" || true)

          if [ "$http_status" = "200" ]; then
            test -s _input/previous-catalog.json
            echo "Previous catalog downloaded."
          elif [ "$http_status" = "404" ]; then
            rm -f _input/previous-catalog.json
            echo "Previous catalog not found. Treating this as first run."
          else
            rm -f _input/previous-catalog.json
            echo "Failed to download previous catalog. HTTP status: $http_status"
            exit 1
          fi

      - name: Prepare Pages site
        run: |
          mkdir -p _site
          cp -a Frontend/. _site/

      - name: Generate data.json
        run: >
          dotnet run --configuration Release --project DigitalBoardGameList.csproj --
          LogLevel=${{ inputs.logLevel }}
          GameCatalogPath=games.yaml
          OutputCatalogPath=_site/data.json
          PreviousCatalogPath=_input/previous-catalog.json
          BggCsvPath=_input/boardgames_ranks.csv
          OnlyNew=${{ inputs.onlyNew }}
          ForceDlcUpdate=${{ inputs.forceDlcUpdate }}
          TestRun=${{ inputs.testRun }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
